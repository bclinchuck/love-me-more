<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Love Me More</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #fdf0f3; --card: #fff8f9; --accent: #d4537e;
      --text: #4b1528; --muted: #99566e; --border: #f0c0d0;
    }

    body {
      font-family: 'Georgia', serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    header { text-align: center; margin-bottom: 2.5rem; }
    header h1 { font-size: 2.2rem; font-weight: normal; letter-spacing: 0.05em; color: var(--accent); }
    header p { font-size: 0.95rem; color: var(--muted); margin-top: 0.4rem; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      max-width: 560px;
      width: 100%;
      margin-bottom: 1.5rem;
    }

    .question-label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 0.75rem; }
    .question-text { font-size: 1.35rem; line-height: 1.6; color: var(--text); }

    input[type="email"], input[type="password"] {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      font-family: 'Georgia', serif;
      font-size: 1rem;
      color: var(--text);
      background: var(--bg);
      margin-bottom: 0.75rem;
      outline: none;
    }

    input[type="email"]:focus, input[type="password"]:focus { border-color: var(--accent); }

    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.85rem 1rem;
      font-family: 'Georgia', serif;
      font-size: 1rem;
      color: var(--text);
      background: var(--bg);
      resize: vertical;
      min-height: 120px;
      margin-top: 1.25rem;
      outline: none;
    }

    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); opacity: 0.7; }

    button {
      margin-top: 1rem;
      width: 100%;
      padding: 0.8rem;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-family: 'Georgia', serif;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #b8416a; }

    button.secondary {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--border);
      margin-top: 0.5rem;
    }

    button.secondary:hover { background: var(--accent-light); }

    .error { color: #c0392b; font-size: 0.9rem; margin-top: 0.5rem; }
    .confirmation { text-align: center; padding: 1.5rem; font-size: 1.1rem; color: var(--accent); }

    .past-answer {
      border-bottom: 1px solid var(--border);
      padding: 1rem 0;
    }

    .past-answer:last-child { border-bottom: none; }
    .past-date { font-size: 0.8rem; color: var(--muted); margin-bottom: 0.4rem; }
    .past-question { font-size: 0.95rem; color: var(--muted); margin-bottom: 0.4rem; font-style: italic; }
    .past-text { font-size: 1rem; color: var(--text); line-height: 1.6; }

    .color-switcher { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .color-switcher span { font-size: 0.8rem; color: var(--muted); width: 100%; text-align: center; margin-bottom: 0.25rem; }

    .swatch { width: 28px; height: 28px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: transform 0.15s; }
    .swatch:hover { transform: scale(1.15); }
    .swatch.active { border-color: var(--text); }

    .user-bar { font-size: 0.85rem; color: var(--muted); text-align: center; margin-bottom: 1rem; }
    .user-bar a { color: var(--accent); cursor: pointer; text-decoration: underline; }

    footer { margin-top: 2rem; font-size: 0.8rem; color: var(--muted); text-align: center; }

    .hidden { display: none; }
  </style>
</head>
<body>

  <header>
    <h1>love me more</h1>
    <p>a daily question, just for you</p>
  </header>

  <!-- AUTH CARD -->
  <div class="card" id="auth-card">
    <p class="question-label" id="auth-title">Sign in</p>
    <input type="email" id="auth-email" placeholder="your email" />
    <input type="password" id="auth-password" placeholder="your password" />
    <p class="error hidden" id="auth-error"></p>
    <button onclick="handleAuth()">Continue</button>
    <button class="secondary" onclick="toggleAuthMode()">No account yet? Sign up</button>
  </div>

  <!-- MAIN APP (hidden until logged in) -->
  <div id="app" class="hidden">

    <div class="user-bar" id="user-bar"></div>

    <!-- QUESTION CARD -->
    <div class="card" id="question-card">
      <p class="question-label">Today's question</p>
      <p class="question-text" id="question-text">Loading...</p>
      <div id="answer-section">
        <textarea id="answer-input" placeholder="Write your answer here..."></textarea>
        <button onclick="submitAnswer()">Save my answer</button>
      </div>
      <div class="confirmation hidden" id="confirmation">
        Your answer has been saved. Come back tomorrow. ♡
      </div>
      <div class="hidden" id="already-answered" style="text-align:center; padding: 1rem; color: var(--muted); font-style: italic;">
        You've already answered today's question. ♡
      </div>
    </div>

    <!-- PAST ANSWERS CARD -->
    <div class="card">
      <p class="question-label">Your past answers</p>
      <button onclick="togglePastAnswers()" style="margin-top:0;">Show my answers</button>
      <div id="past-answers-list" class="hidden" style="margin-top: 1.25rem;"></div>
    </div>

    <!-- COLOR SWITCHER -->
    <div class="card" style="text-align: center;">
      <div class="color-switcher">
        <span>change the mood</span>
        <div class="swatch active" style="background:#fdf0f3;" onclick="setTheme('pink',event)" title="Rose"></div>
        <div class="swatch" style="background:#f0f4f0;" onclick="setTheme('sage',event)" title="Sage"></div>
        <div class="swatch" style="background:#fdf5ec;" onclick="setTheme('peach',event)" title="Peach"></div>
        <div class="swatch" style="background:#eef2f8;" onclick="setTheme('lavender',event)" title="Lavender"></div>
        <div class="swatch" style="background:#f5f0eb;" onclick="setTheme('linen',event)" title="Linen"></div>
      </div>
    </div>

  </div>

  <footer>made with love ♡</footer>

  <script>
    const SUPABASE_URL = 'https://usceygitgahbqkqmckry.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVzY2V5Z2l0Z2FoYnFrcW1ja3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMzEwNjcsImV4cCI6MjA5MTYwNzA2N30.l2UK3PO8L0WnvsjveciWuyzeuPXWSJ1frWC9WUQoO84';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;
    let currentQuestion = null;
    let isSignUp = false;

    // ── INIT ──────────────────────────────────────────
    async function init() {
      const { data: { session } } = await sb.auth.getSession();
      if (session) {
        currentUser = session.user;
        showApp();
      }
    }

    init();

    // ── AUTH ──────────────────────────────────────────
    function toggleAuthMode() {
      isSignUp = !isSignUp;
      document.getElementById('auth-title').textContent = isSignUp ? 'Create account' : 'Sign in';
      document.querySelector('#auth-card button.secondary').textContent = isSignUp ? 'Already have an account? Sign in' : 'No account yet? Sign up';
    }

    async function handleAuth() {
      const email = document.getElementById('auth-email').value.trim();
      const password = document.getElementById('auth-password').value;
      const errorEl = document.getElementById('auth-error');
      errorEl.classList.add('hidden');

      if (!email || !password) {
        errorEl.textContent = 'Please enter your email and password.';
        errorEl.classList.remove('hidden');
        return;
      }

      let result;
      if (isSignUp) {
        result = await sb.auth.signUp({ email, password });
      } else {
        result = await sb.auth.signInWithPassword({ email, password });
      }

      if (result.error) {
        errorEl.textContent = result.error.message;
        errorEl.classList.remove('hidden');
        return;
      }

      currentUser = result.data.user;

      if (isSignUp) {
        errorEl.style.color = '#4a7c59';
        errorEl.textContent = 'Account created! Check your email to confirm, then sign in.';
        errorEl.classList.remove('hidden');
        return;
      }

      showApp();
    }

    // ── APP ───────────────────────────────────────────
    async function showApp() {
      document.getElementById('auth-card').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
      document.getElementById('user-bar').innerHTML = `Signed in as ${currentUser.email} — <a onclick="signOut()">sign out</a>`;
      await loadQuestion();
    }

    async function signOut() {
      await sb.auth.signOut();
      location.reload();
    }

    // ── QUESTION ──────────────────────────────────────
    async function loadQuestion() {
      const today = new Date().toISOString().split('T')[0];

      const { data, error } = await sb
        .from('questions')
        .select('*')
        .eq('show_date', today)
        .single();

      if (error || !data) {
        document.getElementById('question-text').textContent = 'No question for today yet. Check back soon.';
        return;
      }

      currentQuestion = data;
      document.getElementById('question-text').textContent = data.question_text;
      await checkIfAnswered();
    }

    async function checkIfAnswered() {
      if (!currentQuestion) return;
      const { data } = await sb
        .from('answers')
        .select('id')
        .eq('user_id', currentUser.id)
        .eq('question_id', currentQuestion.id)
        .single();

      if (data) {
        document.getElementById('answer-section').classList.add('hidden');
        document.getElementById('already-answered').classList.remove('hidden');
      }
    }

    // ── SUBMIT ────────────────────────────────────────
    async function submitAnswer() {
      const text = document.getElementById('answer-input').value.trim();
      if (!text || !currentQuestion) return;

      const { error } = await sb.from('answers').insert({
        user_id: currentUser.id,
        question_id: currentQuestion.id,
        answer_text: text,
      });

      if (error) {
        alert('Something went wrong saving your answer. Please try again.');
        return;
      }

      document.getElementById('answer-section').classList.add('hidden');
      document.getElementById('confirmation').classList.remove('hidden');
    }

    // ── PAST ANSWERS ──────────────────────────────────
    let pastVisible = false;
    async function togglePastAnswers() {
      const list = document.getElementById('past-answers-list');
      const btn = document.querySelector('#app .card:nth-child(3) button');

      if (pastVisible) {
        list.classList.add('hidden');
        btn.textContent = 'Show my answers';
        pastVisible = false;
        return;
      }

      btn.textContent = 'Hide my answers';
      pastVisible = true;
      list.classList.remove('hidden');
      list.innerHTML = '<p style="color:var(--muted)">Loading...</p>';

      const { data, error } = await sb
        .from('answers')
        .select('answer_text, created_at, question_id, questions(question_text, show_date)')
        .eq('user_id', currentUser.id)
        .order('created_at', { ascending: false });

      if (error || !data || data.length === 0) {
        list.innerHTML = '<p style="color:var(--muted); font-style:italic;">No past answers yet.</p>';
        return;
      }

      list.innerHTML = data.map(a => `
        <div class="past-answer">
          <p class="past-date">${new Date(a.questions.show_date).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}</p>
          <p class="past-question">${a.questions.question_text}</p>
          <p class="past-text">${a.answer_text}</p>
        </div>
      `).join('');
    }

    // ── THEME ─────────────────────────────────────────
    const themes = {
      pink:     { bg:'#fdf0f3', card:'#fff8f9', accent:'#d4537e', text:'#4b1528', muted:'#99566e', border:'#f0c0d0' },
      sage:     { bg:'#f0f4f0', card:'#f8fbf8', accent:'#4a7c59', text:'#1a3326', muted:'#5a7a68', border:'#c3d9cb' },
      peach:    { bg:'#fdf5ec', card:'#fffaf5', accent:'#c4703a', text:'#4a2010', muted:'#9a6040', border:'#f0c8a8' },
      lavender: { bg:'#eef2f8', card:'#f8f6ff', accent:'#6b5abf', text:'#261e52', muted:'#7068a0', border:'#cec8f0' },
      linen:    { bg:'#f5f0eb', card:'#fdfaf7', accent:'#8b6f47', text:'#3a2d1e', muted:'#8a7060', border:'#d9c9b0' },
    };

    function setTheme(name, event) {
      const t = themes[name];
      const r = document.documentElement.style;
      r.setProperty('--bg', t.bg); r.setProperty('--card', t.card);
      r.setProperty('--accent', t.accent); r.setProperty('--text', t.text);
      r.setProperty('--muted', t.muted); r.setProperty('--border', t.border);
      document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
      event.target.classList.add('active');
    }
  </script>

</body>
</html>
